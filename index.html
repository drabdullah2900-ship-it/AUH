<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشفى الجامعة بحلب - AUH</title>
    <!-- مكتبات Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:Tahoma;background:linear-gradient(135deg,#0a3d62,#1e90ff);min-height:100vh;padding:20px}
        .header{text-align:center;color:white;margin-bottom:20px}
        .header h1{font-size:2.2em;text-shadow:2px 2px 4px rgba(0,0,0,0.3)}
        .top-bar{text-align:center;margin-bottom:20px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
        .dashboard{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:25px;max-width:1400px;margin:0 auto}
        .ward-card{background:white;border-radius:20px;padding:20px;cursor:pointer;box-shadow:0 10px 30px rgba(0,0,0,0.2);transition:all 0.3s}
        .ward-card:hover{transform:translateY(-5px)}
        .ward-card h2{color:#0a3d62;margin-bottom:10px}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:1000;justify-content:center;align-items:center;backdrop-filter:blur(5px)}
        .modal.active{display:flex}
        .modal-content{background:white;border-radius:20px;width:95%;max-width:1100px;max-height:90vh;overflow-y:auto;padding:25px}
        .close-btn{position:sticky;top:10px;float:left;background:none;border:none;font-size:2.2em;cursor:pointer;color:#e74c3c;z-index:10}
        .room-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:15px;margin-top:15px;clear:both}
        .room{border:2px solid #ddd;border-radius:15px;padding:15px;position:relative}
        .room.available{border-color:#2ecc71;background:#f0fff4;box-shadow:0 0 15px rgba(46,204,113,0.3)}
        .room.full{border-color:#e74c3c;background:#fff5f5}
        .patient{background:#f8f9fa;border-radius:10px;padding:10px;margin:8px 0;border-right:4px solid #1e90ff;font-size:0.9em}
        .tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:0.75em;font-weight:bold;margin:2px}
        .tag.مقيم{background:#ffeaa7;color:#d68910}
        .tag.قيد-تخريج{background:#74b9ff;color:#054a91}
        .tag.مخرج{background:#dfe6e9;color:#636e72}
        .available-badge{background:#2ecc71;color:white;padding:5px 12px;border-radius:20px;font-size:0.8em;animation:pulse 1.5s infinite;display:inline-block}
        .full-badge{background:#e74c3c;color:white;padding:5px 12px;border-radius:20px;font-size:0.8em;display:inline-block}
        @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(46,204,113,0.5)}70%{box-shadow:0 0 0 10px rgba(46,204,113,0)}100%{box-shadow:0 0 0 0 rgba(46,204,113,0)}}
        .btn{padding:8px 16px;border:none;border-radius:20px;cursor:pointer;font-weight:bold;margin:2px;font-family:inherit;font-size:0.85em;transition:all 0.2s}
        .btn:hover{opacity:0.9;transform:scale(1.05)}
        .btn-primary{background:#2ecc71;color:white}
        .btn-warning{background:#f39c12;color:white}
        .btn-danger{background:#e74c3c;color:white}
        .btn-info{background:#3498db;color:white}
        .btn-sm{padding:5px 10px;font-size:0.75em}
        .form-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:2000;justify-content:center;align-items:center;backdrop-filter:blur(5px)}
        .form-overlay.active{display:flex}
        .form-box{background:white;border-radius:20px;padding:25px;width:95%;max-width:500px;text-align:right}
        .form-box h3{color:#0a3d62;text-align:center;margin-bottom:20px}
        .form-group{margin-bottom:12px}
        .form-group label{display:block;margin-bottom:4px;font-weight:bold;color:#333}
        .form-group input,.form-group select{width:100%;padding:10px;border:2px solid #ddd;border-radius:10px;font-family:inherit;font-size:0.95em}
        .form-group input:focus,.form-group select:focus{outline:none;border-color:#1e90ff}
        .form-actions{display:flex;gap:10px;justify-content:center;margin-top:20px}
        .status-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-left:5px}
        .status-dot.green{background:#2ecc71;box-shadow:0 0 8px #2ecc71}
        .status-dot.red{background:#e74c3c}
        .ward-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:15px}
        .loading{text-align:center;color:white;font-size:1.5em;padding:50px}
    </style>
</head>
<body>
<div class="header">
    <h1>🏥 مشفى جامعة حلب AUH</h1>
    <p>لوحة متابعة الأجنحة والمرضى - بيانات مشتركة مباشرة</p>
</div>
<div class="top-bar">
    <button class="btn btn-danger" onclick="resetAllData()">🔄 إعادة ضبط البيانات</button>
    <button class="btn btn-info" onclick="exportData()">📥 تصدير نسخة احتياطية</button>
</div>

<div class="loading" id="loading">⏳ جاري تحميل البيانات...</div>
<div class="dashboard" id="dashboard" style="display:none"></div>

<!-- نافذة عرض الجناح -->
<div class="modal" id="wardModal">
    <div class="modal-content">
        <button class="close-btn" onclick="closeModal()">&times;</button>
        <div class="ward-header">
            <h2 id="modalTitle" style="color:#0a3d62"></h2>
            <button class="btn btn-primary" onclick="openPatientForm()">➕ إضافة مريض</button>
        </div>
        <div class="room-grid" id="roomGrid"></div>
    </div>
</div>

<!-- نافذة إضافة/تعديل مريض -->
<div class="form-overlay" id="patientForm">
    <div class="form-box">
        <h3 id="formTitle">➕ إضافة مريض جديد</h3>
        <div class="form-group"><label>👤 اسم المريض</label><input type="text" id="pName" placeholder="الاسم الكامل"></div>
        <div class="form-group"><label>📋 التشخيص</label><input type="text" id="pDiagnosis" placeholder="تشخيص المرض"></div>
        <div class="form-group"><label>👨‍⚕️ الأخصائي</label><input type="text" id="pSpecialist" placeholder="د. الاسم"></div>
        <div class="form-group"><label>🏷️ الشعبة</label><select id="pUnit"><option>صدرية</option><option>كلية</option><option>هضمية</option><option>عصبية</option><option>داخلية</option><option>قلبية</option><option>جراحة وعائية</option><option>جراحة عصبية</option><option>جراحة عظمية</option><option>جراحة بولية</option><option>أورام</option><option>عينية</option><option>خارجية</option><option>خاص</option><option>عام</option></select></div>
        <div class="form-group"><label>📊 الحالة</label><select id="pStatus"><option>مقيم</option><option>قيد التخريج</option><option>مخرج</option></select></div>
        <div class="form-group"><label>🚪 الغرفة</label><select id="pRoom"></select></div>
        <div class="form-actions">
            <button class="btn btn-primary" onclick="savePatient()">💾 حفظ</button>
            <button class="btn btn-danger" onclick="closePatientForm()">❌ إلغاء</button>
        </div>
        <input type="hidden" id="editWardId"><input type="hidden" id="editRoomIdx"><input type="hidden" id="editPatIdx" value="-1">
    </div>
</div>

<script>
// ========== اعدادات Firebase الخاصة بك (استبدلها) ==========
const firebaseConfig = {
  apiKey: "AIzaSyBfbvPwyDPgxAllPC9lKqEFWNSbIUN1aQg",
  authDomain: "auh-hospital.firebaseapp.com",
  databaseURL: "https://auh-hospital-default-rtdb.firebaseio.com",
  projectId: "auh-hospital",
  storageBucket: "auh-hospital.firebasestorage.app",
  messagingSenderId: "13884014112",
  appId: "1:13884014112:web:aec4efdc2b9186c50fc645"
};

// تهيئة Firebase
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// ========== البيانات الافتراضية ==========
const defaultWards = [
    {id:1,name:"جناح الصدرية والكلية",rooms:[
        {number:"101",capacity:4,patients:[{name:"أحمد العلي",diagnosis:"ربو قصبي",specialist:"د. محمد نور",unit:"صدرية",status:"مقيم"},{name:"فاطمة الحسين",diagnosis:"فشل كلوي",specialist:"د. رنا قدور",unit:"كلية",status:"مقيم"}]},
        {number:"102",capacity:4,patients:[{name:"محمود الخطيب",diagnosis:"ذات رئة",specialist:"د. محمد نور",unit:"صدرية",status:"قيد التخريج"}]},
        {number:"103",capacity:4,patients:[]},
        {number:"104",capacity:4,patients:[{name:"سارة العمر",diagnosis:"تهاب كبيبات",specialist:"د. رنا قدور",unit:"كلية",status:"مقيم"},{name:"علي حسن",diagnosis:"انسداد رئوي",specialist:"د. محمد نور",unit:"صدرية",status:"مقيم"},{name:"نور الهدى",diagnosis:"تهاب قصبات",specialist:"د. أحمد شيخ",unit:"صدرية",status:"مخرج"}]},
        {number:"105",capacity:4,patients:[{name:"خالد الجاسم",diagnosis:"غسيل كلى",specialist:"د. رنا قدور",unit:"كلية",status:"مقيم"}]},
        {number:"106",capacity:4,patients:[]},
        {number:"107",capacity:4,patients:[{name:"ريم علي",diagnosis:"ربو حاد",specialist:"د. أحمد شيخ",unit:"صدرية",status:"قيد التخريج"}]},
        {number:"108",capacity:4,patients:[]}
    ]},
    {id:2,name:"جناح الهضمية والعصبية",rooms:[
        {number:"201",capacity:4,patients:[{name:"عمر القاضي",diagnosis:"تشمع كبد",specialist:"د. سامر زين",unit:"هضمية",status:"مقيم"}]},
        {number:"202",capacity:4,patients:[]},
        {number:"203",capacity:4,patients:[{name:"لينا خليل",diagnosis:"صرع",specialist:"د. هاني يونس",unit:"عصبية",status:"مقيم"},{name:"وسام درويش",diagnosis:"قرحة هضمية",specialist:"د. سامر زين",unit:"هضمية",status:"مقيم"}]}
    ]},
    {id:3,name:"جناح العناية الداخلية",rooms:[
        {number:"301",capacity:4,patients:[{name:"حسن اليوسف",diagnosis:"سكري غير معاوض",specialist:"د. ليلى عثمان",unit:"داخلية",status:"مقيم"}]},
        {number:"302",capacity:4,patients:[]}
    ]},
    {id:4,name:"الخاص الثالث",rooms:[
        {number:"401",capacity:2,patients:[{name:"كريم سعد",diagnosis:"متابعة قلبية",specialist:"د. نضال الحافظ",unit:"قلبية",status:"مقيم"}]},
        {number:"402",capacity:2,patients:[]}
    ]},
    {id:5,name:"الخاص الرابع",rooms:[
        {number:"501",capacity:2,patients:[]},
        {number:"502",capacity:2,patients:[{name:"سوسن عبدالله",diagnosis:"جراحة عامة",specialist:"د. فادي حمدان",unit:"جراحة",status:"قيد التخريج"}]}
    ]},
    {id:6,name:"الخارجيات",rooms:[
        {number:"خ-1",capacity:6,patients:[{name:"رامي الأسود",diagnosis:"تطبيب خارجي",specialist:"د. نورا عبدالقادر",unit:"خارجية",status:"مقيم"},{name:"هبة عكاش",diagnosis:"تطبيب خارجي",specialist:"د. نورا عبدالقادر",unit:"خارجية",status:"مقيم"}]}
    ]},
    {id:7,name:"العناية القلبية والجراحات",rooms:[
        {number:"601 وعائية",capacity:3,patients:[{name:"عدنان الريس",diagnosis:"بعد قثطرة",specialist:"د. نضال الحافظ",unit:"قلبية",status:"مقيم"}]},
        {number:"602 عصبية",capacity:3,patients:[]},
        {number:"603 عظمية",capacity:3,patients:[{name:"جهاد المصري",diagnosis:"كسر فخذ",specialist:"د. عامر حلبي",unit:"جراحة عظمية",status:"مقيم"}]},
        {number:"604 بولية",capacity:3,patients:[]},
        {number:"605 أورام",capacity:3,patients:[]},
        {number:"606 عينية",capacity:3,patients:[]}
    ]}
];

let wardsData = [];

// تحميل البيانات من Firebase
function loadData() {
    database.ref('wards').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            wardsData = data;
            renderDashboard();
        } else {
            // أول مرة: إنشاء البيانات الافتراضية
            wardsData = JSON.parse(JSON.stringify(defaultWards));
            saveAllData();
            renderDashboard();
        }
        document.getElementById('loading').style.display = 'none';
        document.getElementById('dashboard').style.display = 'grid';
    }, (error) => {
        alert('❌ فشل تحميل البيانات: ' + error.message);
        document.getElementById('loading').textContent = 'فشل الاتصال بقاعدة البيانات';
    });
}

function saveAllData() {
    database.ref('wards').set(wardsData);
}

function resetAllData() {
    if(confirm('⚠️ هل أنت متأكد من إعادة ضبط جميع البيانات؟ ستفقد كل التعديلات.')) {
        wardsData = JSON.parse(JSON.stringify(defaultWards));
        saveAllData();
        // التحديث سيحدث تلقائياً عبر listener
    }
}

function exportData() {
    let blob = new Blob([JSON.stringify(wardsData,null,2)], {type:'application/json'});
    let a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'AUH_backup_' + new Date().toISOString().split('T')[0] + '.json';
    a.click();
}

// ========== عرض اللوحة ==========
function renderDashboard() {
    document.getElementById('dashboard').innerHTML = wardsData.map(w => {
        let total = w.rooms.reduce((s,r) => s + r.capacity, 0);
        let occupied = w.rooms.reduce((s,r) => s + r.patients.length, 0);
        let avail = total - occupied;
        return `<div class="ward-card" onclick="openWard(${w.id})">
            <h2>🏥 ${w.name}</h2>
            <p>🛏️ غرف: ${w.rooms.length} | 👤 مرضى: ${occupied}/${total} | <span class="status-dot ${avail>0?'green':'red'}"></span> متاح: ${avail}</p>
            ${avail>0 ? `<span class="available-badge">✨ ${avail} أماكن متاحة ✨</span>` : '<span class="full-badge">⚠️ ممتلئ</span>'}
        </div>`;
    }).join('');
}

// ========== فتح جناح ==========
let currentWardId = null;
function openWard(id) {
    currentWardId = id;
    let w = wardsData.find(w => w.id === id);
    if(!w) return;
    document.getElementById('modalTitle').textContent = w.name;
    document.getElementById('roomGrid').innerHTML = w.rooms.map((r,ri) => {
        let avail = r.capacity - r.patients.length;
        return `<div class="room ${avail>0?'available':'full'}">
            <h4>🚪 غرفة ${r.number} ${avail>0 ? `<span class="available-badge">${avail} متاح</span>` : '<span class="full-badge">ممتلئة</span>'}</h4>
            ${r.patients.length===0 ? '<p style="color:#888;text-align:center;padding:10px;">🛏️ غرفة فارغة</p>' : ''}
            ${r.patients.map((p,pi) => `
                <div class="patient">
                    <strong>👤 ${p.name}</strong><br>
                    📋 ${p.diagnosis}<br>
                    👨‍⚕️ ${p.specialist}<br>
                    🏷️ ${p.unit}<br>
                    <span class="tag ${p.status.replace(/\s/g,'-')}">${p.status}</span>
                    <div style="margin-top:6px;">
                        <button class="btn btn-warning btn-sm" onclick="event.stopPropagation();editPatient(${id},${ri},${pi})">✏️ تعديل</button>
                        <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deletePatient(${id},${ri},${pi})">🗑️ حذف</button>
                    </div>
                </div>
            `).join('')}
            <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();openPatientFormForRoom(${id},${ri})" style="margin-top:8px;width:100%;">➕ حجز سرير</button>
        </div>`;
    }).join('');
    document.getElementById('wardModal').classList.add('active');
}
function closeModal() {
    document.getElementById('wardModal').classList.remove('active');
    renderDashboard();
}

// ========== إدارة المرضى ==========
function openPatientForm() {
    document.getElementById('formTitle').textContent = '➕ إضافة مريض جديد';
    document.getElementById('editPatIdx').value = '-1';
    document.getElementById('editWardId').value = currentWardId;
    document.getElementById('editRoomIdx').value = '';
    clearForm();
    fillRoomSelect();
    document.getElementById('patientForm').classList.add('active');
}
function openPatientFormForRoom(wid, rid) {
    currentWardId = wid;
    document.getElementById('formTitle').textContent = '➕ حجز في غرفة ' + wardsData.find(w=>w.id===wid).rooms[rid].number;
    document.getElementById('editPatIdx').value = '-1';
    document.getElementById('editWardId').value = wid;
    document.getElementById('editRoomIdx').value = rid;
    clearForm();
    fillRoomSelect(rid);
    document.getElementById('patientForm').classList.add('active');
}
function editPatient(wid, rid, pid) {
    currentWardId = wid;
    let p = wardsData.find(w=>w.id===wid).rooms[rid].patients[pid];
    document.getElementById('formTitle').textContent = '✏️ تعديل بيانات المريض';
    document.getElementById('editPatIdx').value = pid;
    document.getElementById('editWardId').value = wid;
    document.getElementById('editRoomIdx').value = rid;
    document.getElementById('pName').value = p.name;
    document.getElementById('pDiagnosis').value = p.diagnosis;
    document.getElementById('pSpecialist').value = p.specialist;
    document.getElementById('pUnit').value = p.unit;
    document.getElementById('pStatus').value = p.status;
    fillRoomSelect(rid);
    document.getElementById('patientForm').classList.add('active');
}
function clearForm() {
    document.getElementById('pName').value = '';
    document.getElementById('pDiagnosis').value = '';
    document.getElementById('pSpecialist').value = '';
    document.getElementById('pUnit').value = 'صدرية';
    document.getElementById('pStatus').value = 'مقيم';
}
function fillRoomSelect(selectedIdx = null) {
    let w = wardsData.find(w => w.id === currentWardId);
    let sel = document.getElementById('pRoom');
    sel.innerHTML = w.rooms.map((r,i) => {
        let avail = r.capacity - r.patients.length;
        let isSelected = (selectedIdx !== null && i === selectedIdx) ? 'selected' : '';
        let disabled = (avail <= 0 && i !== selectedIdx) ? 'disabled' : '';
        return `<option value="${i}" ${isSelected} ${disabled}>غرفة ${r.number} (${avail>0 ? avail+' متاح' : 'ممتلئة'})</option>`;
    }).join('');
}
function savePatient() {
    let wid = parseInt(document.getElementById('editWardId').value);
    let rid = parseInt(document.getElementById('pRoom').value);
    let pid = parseInt(document.getElementById('editPatIdx').value);
    let w = wardsData.find(w => w.id === wid);
    let name = document.getElementById('pName').value.trim();
    let diagnosis = document.getElementById('pDiagnosis').value.trim();
    let specialist = document.getElementById('pSpecialist').value.trim();
    if(!name || !diagnosis || !specialist) { alert('⚠️ الرجاء ملء جميع الحقول المطلوبة'); return; }
    let patient = {
        name, diagnosis, specialist,
        unit: document.getElementById('pUnit').value,
        status: document.getElementById('pStatus').value
    };
    if(pid === -1) {
        if(w.rooms[rid].patients.length >= w.rooms[rid].capacity) {
            alert('⚠️ هذه الغرفة ممتلئة! اختر غرفة أخرى.');
            return;
        }
        w.rooms[rid].patients.push(patient);
    } else {
        let oldRid = parseInt(document.getElementById('editRoomIdx').value);
        if(oldRid !== rid) {
            if(w.rooms[rid].patients.length >= w.rooms[rid].capacity) {
                alert('⚠️ الغرفة الجديدة ممتلئة!');
                return;
            }
            w.rooms[oldRid].patients.splice(pid, 1);
            w.rooms[rid].patients.push(patient);
        } else {
            w.rooms[rid].patients[pid] = patient;
        }
    }
    saveAllData();
    closePatientForm();
    openWard(wid); // إعادة فتح الجناح لعرض التغييرات
}
function deletePatient(wid, rid, pid) {
    if(!confirm('⚠️ هل أنت متأكد من حذف هذا المريض؟')) return;
    wardsData.find(w=>w.id===wid).rooms[rid].patients.splice(pid, 1);
    saveAllData();
    openWard(wid);
}
function closePatientForm() {
    document.getElementById('patientForm').classList.remove('active');
}

// إغلاق النوافذ
document.getElementById('wardModal').addEventListener('click', function(e) {
    if(e.target === this) closeModal();
});
document.getElementById('patientForm').addEventListener('click', function(e) {
    if(e.target === this) closePatientForm();
});

// بدء التحميل
loadData();
</script>
</body>
</html>
