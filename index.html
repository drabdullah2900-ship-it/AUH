<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشفى الجامعة بحلب - AUH</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:Tahoma;background:linear-gradient(135deg,#0a3d62,#1e90ff);min-height:100vh;padding:20px}
        .header{text-align:center;color:white;margin-bottom:20px}
        .header h1{font-size:2.2em;text-shadow:2px 2px 4px rgba(0,0,0,0.3)}
        .dashboard{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:25px;max-width:1400px;margin:0 auto}
        .ward-card{background:white;border-radius:20px;padding:20px;cursor:pointer;box-shadow:0 10px 30px rgba(0,0,0,0.2);transition:all 0.3s}
        .ward-card:hover{transform:translateY(-5px)}
        .ward-card h2{color:#0a3d62;margin-bottom:10px}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:1000;justify-content:center;align-items:center;backdrop-filter:blur(5px)}
        .modal.active{display:flex}
        .modal-content{background:white;border-radius:20px;width:95%;max-width:1100px;max-height:90vh;overflow-y:auto;padding:25px}
        .close-btn{position:absolute;top:10px;left:15px;background:none;border:none;font-size:2.2em;cursor:pointer;color:#e74c3c}
        .room-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:15px;margin-top:15px}
        .room{border:2px solid #ddd;border-radius:15px;padding:15px}
        .room.available{border-color:#2ecc71;background:#f0fff4;box-shadow:0 0 15px rgba(46,204,113,0.3)}
        .patient{background:#f8f9fa;border-radius:10px;padding:10px;margin:8px 0;border-right:4px solid #1e90ff;font-size:0.9em}
        .tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:0.75em;font-weight:bold;margin:2px}
        .tag.مقيم{background:#ffeaa7;color:#d68910}
        .tag.قيد-تخريج{background:#74b9ff;color:#054a91}
        .tag.مخرج{background:#dfe6e9;color:#636e72}
        .available-badge{background:#2ecc71;color:white;padding:5px 12px;border-radius:20px;font-size:0.8em;animation:pulse 1.5s infinite;display:inline-block}
        @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(46,204,113,0.5)}70%{box-shadow:0 0 0 10px rgba(46,204,113,0)}100%{box-shadow:0 0 0 0 rgba(46,204,113,0)}}
        .btn{padding:8px 16px;border:none;border-radius:20px;cursor:pointer;font-weight:bold;margin:2px;font-family:inherit}
        .btn-primary{background:#2ecc71;color:white}
        .btn-warning{background:#f39c12;color:white}
        .btn-danger{background:#e74c3c;color:white}
        .btn-info{background:#3498db;color:white}
        .btn-sm{padding:5px 10px;font-size:0.75em}
        .form-group{margin-bottom:12px}
        .form-group label{display:block;margin-bottom:4px;font-weight:bold}
        .form-group input,.form-group select{width:100%;padding:8px;border:2px solid #ddd;border-radius:10px;font-family:inherit}
        .status-dot{display:inline-block;width:12px;height:12px;border-radius:50%;margin-left:5px;vertical-align:middle}
        .status-dot.green{background:#2ecc71;box-shadow:0 0 10px #2ecc71}
        .status-dot.red{background:#e74c3c}
        .loading{text-align:center;color:white;font-size:1.5em;padding:50px}
    </style>
</head>
<body>
<div class="header">
    <h1>🏥 مشفى جامعة حلب AUH</h1>
    <p>لوحة متابعة الأجنحة والمرضى - بيانات مشتركة مباشرة</p>
</div>

<div class="loading" id="loading">⏳ جاري تحميل البيانات...</div>
<div class="dashboard" id="dashboard" style="display:none"></div>
<div class="modal" id="wardModal">
    <div class="modal-content">
        <button class="close-btn" onclick="closeModal()">&times;</button>
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:15px">
            <h2 id="modalTitle" style="color:#0a3d62"></h2>
            <button class="btn btn-primary" onclick="showAddPatientForm()">➕ إضافة مريض جديد</button>
        </div>
        <div class="room-grid" id="roomGrid"></div>
    </div>
</div>

<div class="modal" id="formModal">
    <div class="modal-content" style="max-width:500px;text-align:right">
        <h3 id="formTitle" style="color:#0a3d62;text-align:center;margin-bottom:20px">➕ إضافة مريض جديد</h3>
        <div class="form-group"><label>👤 اسم المريض</label><input type="text" id="pName" placeholder="الاسم الكامل"></div>
        <div class="form-group"><label>📋 التشخيص</label><input type="text" id="pDiagnosis" placeholder="تشخيص المرض"></div>
        <div class="form-group"><label>👨‍⚕️ الأخصائي</label><input type="text" id="pSpecialist" placeholder="د. الاسم"></div>
        <div class="form-group"><label>🏷️ الشعبة</label><select id="pUnit"><option>صدرية</option><option>كلية</option><option>هضمية</option><option>عصبية</option><option>داخلية</option><option>قلبية</option><option>جراحة وعائية</option><option>جراحة عصبية</option><option>جراحة عظمية</option><option>جراحة بولية</option><option>أورام</option><option>عينية</option><option>خارجية</option><option>خاص</option></select></div>
        <div class="form-group"><label>📊 الحالة</label><select id="pStatus"><option>مقيم</option><option>قيد التخريج</option><option>مخرج</option></select></div>
        <div class="form-group"><label>🚪 الغرفة</label><select id="pRoom"></select></div>
        <div style="display:flex;gap:10px;justify-content:center;margin-top:20px">
            <button class="btn btn-primary" onclick="savePatient()">💾 حفظ</button>
            <button class="btn btn-danger" onclick="closeFormModal()">❌ إلغاء</button>
        </div>
        <input type="hidden" id="editWardId"><input type="hidden" id="editRoomIdx"><input type="hidden" id="editPatIdx" value="-1">
    </div>
</div>

<script>
// إعدادات Firebase - بدلها بإعدادات مشروعك
const firebaseConfig = {
    apiKey: "AIzaSyBmTzgG_PMqGXGXXXxxxXXXxxxXXX",
    authDomain: "your-project.firebaseapp.com",
    databaseURL: "https://your-project-default-rtdb.firebaseio.com",
    projectId: "your-project",
    storageBucket: "your-project.appspot.com",
    messagingSenderId: "000000000000",
    appId: "1:000000000000:web:xxxxxxxxxxxxxxxxxxxx"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();
let wardsData = [];
let currentWardId = null;

// تحميل البيانات من Firebase
function loadData() {
    database.ref('wards').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            wardsData = data;
            renderDashboard();
            document.getElementById('loading').style.display = 'none';
            document.getElementById('dashboard').style.display = 'grid';
        } else {
            // أول مرة - إنشاء بيانات افتراضية
            createDefaultData();
        }
    });
}

function createDefaultData() {
    wardsData = [
        {id:1,name:"جناح الصدرية والكلية",rooms:[
            {number:"101",capacity:4,patients:[{name:"أحمد العلي",diagnosis:"ربو قصبي",specialist:"د. محمد نور",unit:"صدرية",status:"مقيم"},{name:"فاطمة الحسين",diagnosis:"فشل كلوي",specialist:"د. رنا قدور",unit:"كلية",status:"مقيم"}]},
            {number:"102",capacity:4,patients:[{name:"محمود الخطيب",diagnosis:"ذات رئة",specialist:"د. محمد نور",unit:"صدرية",status:"قيد التخريج"}]},
            {number:"103",capacity:4,patients:[]},{number:"104",capacity:4,patients:[{name:"سارة العمر",diagnosis:"تهاب كبيبات",specialist:"د. رنا قدور",unit:"كلية",status:"مقيم"},{name:"علي حسن",diagnosis:"انسداد رئوي",specialist:"د. محمد نور",unit:"صدرية",status:"مقيم"},{name:"نور الهدى",diagnosis:"تهاب قصبات",specialist:"د. أحمد شيخ",unit:"صدرية",status:"مخرج"}]},
            {number:"105",capacity:4,patients:[{name:"خالد الجاسم",diagnosis:"غسيل كلى",specialist:"د. رنا قدور",unit:"كلية",status:"مقيم"}]},{number:"106",capacity:4,patients:[]},{number:"107",capacity:4,patients:[{name:"ريم علي",diagnosis:"ربو حاد",specialist:"د. أحمد شيخ",unit:"صدرية",status:"قيد التخريج"}]},{number:"108",capacity:4,patients:[]}
        ]},
        {id:2,name:"جناح الهضمية والعصبية",rooms:[
            {number:"201",capacity:4,patients:[{name:"عمر القاضي",diagnosis:"تشمع كبد",specialist:"د. سامر زين",unit:"هضمية",status:"مقيم"}]},{number:"202",capacity:4,patients:[]},{number:"203",capacity:4,patients:[{name:"لينا خليل",diagnosis:"صرع",specialist:"د. هاني يونس",unit:"عصبية",status:"مقيم"},{name:"وسام درويش",diagnosis:"قرحة هضمية",specialist:"د. سامر زين",unit:"هضمية",status:"مقيم"}]}
        ]},
        {id:3,name:"جناح العناية الداخلية",rooms:[{number:"301",capacity:4,patients:[{name:"حسن اليوسف",diagnosis:"سكري غير معاوض",specialist:"د. ليلى عثمان",unit:"داخلية",status:"مقيم"}]},{number:"302",capacity:4,patients:[]}]},
        {id:4,name:"الخاص الثالث",rooms:[{number:"401",capacity:2,patients:[{name:"كريم سعد",diagnosis:"متابعة قلبية",specialist:"د. نضال الحافظ",unit:"قلبية",status:"مقيم"}]},{number:"402",capacity:2,patients:[]}]},
        {id:5,name:"الخاص الرابع",rooms:[{number:"501",capacity:2,patients:[]},{number:"502",capacity:2,patients:[{name:"سوسن عبدالله",diagnosis:"جراحة عامة",specialist:"د. فادي حمدان",unit:"جراحة",status:"قيد التخريج"}]}]},
        {id:6,name:"الخارجيات",rooms:[{number:"خ-1",capacity:6,patients:[{name:"رامي الأسود",diagnosis:"تطبيب خارجي",specialist:"د. نورا عبدالقادر",unit:"خارجية",status:"مقيم"},{name:"هبة عكاش",diagnosis:"تطبيب خارجي",specialist:"د. نورا عبدالقادر",unit:"خارجية",status:"مقيم"}]}]},
        {id:7,name:"العناية القلبية والجراحات",rooms:[
            {number:"601 وعائية",capacity:3,patients:[{name:"عدنان الريس",diagnosis:"بعد قثطرة",specialist:"د. نضال الحافظ",unit:"قلبية",status:"مقيم"}]},{number:"602 عصبية",capacity:3,patients:[]},{number:"603 عظمية",capacity:3,patients:[{name:"جهاد المصري",diagnosis:"كسر فخذ",specialist:"د. عامر حلبي",unit:"جراحة عظمية",status:"مقيم"}]},{number:"604 بولية",capacity:3,patients:[]},{number:"605 أورام",capacity:3,patients:[]},{number:"606 عينية",capacity:3,patients:[]}
        ]}
    ];
    saveAllData();
}

function saveAllData() {
    database.ref('wards').set(wardsData);
}

function renderDashboard() {
    document.getElementById('dashboard').innerHTML = wardsData.map(w => {
        let total = w.rooms.reduce((s,r) => s + r.capacity, 0);
        let occupied = w.rooms.reduce((s,r) => s + r.patients.length, 0);
        let avail = total - occupied;
        return <div class="ward-card" onclick="openWard(${w.id})">
            <h2>🏥 ${w.name}</h2>
            <p>🛏️ غرف: ${w.rooms.length} | 👤 مرضى: ${occupied}/${total} | <span class="status-dot ${avail > 0 ? 'green' : 'red'}"></span> متاح: ${avail}</p>
            ${avail > 0 ? <span class="available-badge">✨ ${avail} أماكن متاحة ✨</span> : '<span style="color:#e74c3c">⚠️ ممتلئ</span>'}
        </div>;
    }).join('');
}

function openWard(id) {
    currentWardId = id;
    let w = wardsData.find(w => w.id === id);
    if(!w) return;
    document.getElementById('modalTitle').textContent = w.name;
    document.getElementById('roomGrid').innerHTML = w.rooms.map((r,ri) => {
        let avail = r.capacity - r.patients.length;
        return <div class="room ${avail > 0 ? 'available' : ''}">
            <h4>🚪 غرفة ${r.number} ${avail > 0 ? <span class="available-badge">${avail} متاح</span> : ''}</h4>
            ${r.patients.length === 0 ? '<p style="color:#888;text-align:center;">🛏️ غرفة فارغة</p>' : ''}
            ${r.patients.map((p,pi) => 
                <div class="patient">
                             <strong>👤 ${p.name}</strong><br>
                    📋 ${p.diagnosis}<br>
                    👨‍⚕️ ${p.specialist}<br>
                    🏷️ ${p.unit}<br>
                    <span class="tag ${p.status.replace(/\s/g,'-')}">${p.status}</span>
                    <br>
                    <button class="btn btn-warning btn-sm" onclick="event.stopPropagation();editPatient(${id},${ri},${pi})">✏️ تعديل</button>
                    <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deletePatient(${id},${ri},${pi})">🗑️ حذف</button>
                </div>
            ).join('')}
            <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();showAddFormForRoom(${id},${ri})" style="margin-top:8px;width:100%">➕ حجز سرير</button>
        </div>;
    }).join('');
    document.getElementById('wardModal').classList.add('active');
}

function showAddPatientForm() {
    document.getElementById('formTitle').textContent = '➕ إضافة مريض جديد';
    document.getElementById('editPatIdx').value = '-1';
    document.getElementById('editWardId').value = currentWardId;
    document.getElementById('pName').value = '';
    document.getElementById('pDiagnosis').value = '';
    document.getElementById('pSpecialist').value = '';
    let w = wardsData.find(w => w.id === currentWardId);
    document.getElementById('pRoom').innerHTML = w.rooms.map((r,i) => {
        let avail = r.capacity - r.patients.length;
        return <option value="${i}" ${avail <= 0 ? 'disabled' : ''}>غرفة ${r.number} (${avail > 0 ? avail + ' متاح' : 'ممتلئة'})</option>;
    }).join('');
    document.getElementById('formModal').classList.add('active');
}

function showAddFormForRoom(wid, rid) {
    currentWardId = wid;
    document.getElementById('formTitle').textContent = '➕ حجز في غرفة ' + wardsData.find(w=>w.id===wid).rooms[rid].number;
    document.getElementById('editPatIdx').value = '-1';
    document.getElementById('editWardId').value = wid;
    document.getElementById('editRoomIdx').value = rid;
    document.getElementById('pName').value = '';
    document.getElementById('pDiagnosis').value = '';
    document.getElementById('pSpecialist').value = '';
    let w = wardsData.find(w => w.id === wid);
    document.getElementById('pRoom').innerHTML = w.rooms.map((r,i) => {
        let avail = r.capacity - r.patients.length;
        return <option value="${i}" ${i === rid ? 'selected' : ''} ${avail <= 0 && i !== rid ? 'disabled' : ''}>غرفة ${r.number} (${avail > 0 ? avail + ' متاح' : 'ممتلئة'})</option>;
    }).join('');
    document.getElementById('formModal').classList.add('active');
}

function editPatient(wid, rid, pid) {
    currentWardId = wid;
    let p = wardsData.find(w=>w.id===wid).rooms[rid].patients[pid];
    document.getElementById('formTitle').textContent = '✏️ تعديل بيانات المريض';
    document.getElementById('editPatIdx').value = pid;
    document.getElementById('editWardId').value = wid;
    document.getElementById('editRoomIdx').value = rid;
    document.getElementById('pName').value = p.name;
    document.getElementById('pDiagnosis').value = p.diagnosis;
    document.getElementById('pSpecialist').value = p.specialist;
    document.getElementById('pUnit').value = p.unit;
    document.getElementById('pStatus').value = p.status;
    let w = wardsData.find(w => w.id === wid);
    document.getElementById('pRoom').innerHTML = w.rooms.map((r,i) => {
        let avail = r.capacity - r.patients.length;
        return <option value="${i}" ${i === rid ? 'selected' : ''} ${avail <= 0 && i !== rid ? 'disabled' : ''}>غرفة ${r.number} (${avail > 0 ? avail + ' متاح' : 'ممتلئة'})</option>;
    }).join('');
    document.getElementById('formModal').classList.add('active');
}

function savePatient() {
    let wid = parseInt(document.getElementById('editWardId').value);
    let rid = parseInt(document.getElementById('pRoom').value);
    let pid = parseInt(document.getElementById('editPatIdx').value);
    let w = wardsData.find(w => w.id === wid);
    let name = document.getElementById('pName').value.trim();
    let diagnosis = document.getElementById('pDiagnosis').value.trim();
    let specialist = document.getElementById('pSpecialist').value.trim();
    
    if(!name  !diagnosis  !specialist) { alert('⚠️ الرجاء ملء جميع الحقول'); return; }
    
    let patient = {
        name, diagnosis, specialist,
        unit: document.getElementById('pUnit').value,
        status: document.getElementById('pStatus').value
    };
    
    if(pid === -1) {
        if(w.rooms[rid].patients.length >= w.rooms[rid].capacity) { alert('⚠️ الغرفة ممتلئة!'); return; }
        w.rooms[rid].patients.push(patient);
    } else {
        let oldRid = parseInt(document.getElementById('editRoomIdx').value);
        if(oldRid !== rid) {
            w.rooms[oldRid].patients.splice(pid, 1);
            w.rooms[rid].patients.push(patient);
        } else {
            w.rooms[rid].patients[pid] = patient;
        }
    }
    
    saveAllData();
    closeFormModal();
    openWard(wid);
}

function deletePatient(wid, rid, pid) {
    if(!confirm('⚠️ متأكد من حذف هذا المريض؟')) return;
    wardsData.find(w=>w.id===wid).rooms[rid].patients.splice(pid, 1);
    saveAllData();
    openWard(wid);
}

function closeModal() { document.getElementById('wardModal').classList.remove('active'); }
function closeFormModal() { document.getElementById('formModal').classList.remove('active'); }
document.getElementById('wardModal').addEventListener('click', function(e) { if(e.target === this) closeModal(); });
document.getElementById('formModal').addEventListener('click', function(e) { if(e.target === this) closeFormModal(); });

// بدء التحميل
loadData();
</script>
</body>
</html>
