<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشفى الجامعة بحلب - AUH</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:Tahoma;background:linear-gradient(135deg,#0a3d62,#1e90ff);min-height:100vh;padding:15px}
        .header{text-align:center;color:white;margin-bottom:10px}
        .header h1{font-size:1.8em}
        .top-bar{text-align:center;margin-bottom:12px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
        .dashboard{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:15px;max-width:1300px;margin:0 auto}
        .ward-card{background:white;border-radius:18px;padding:18px;cursor:pointer;box-shadow:0 8px 25px rgba(0,0,0,0.2)}
        .ward-card:hover{transform:translateY(-3px)}
        .ward-card h2{color:#0a3d62;font-size:1.1em;margin-bottom:8px}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:1000;justify-content:center;align-items:center}
        .modal.active{display:flex}
        .modal-content{background:white;border-radius:18px;width:95%;max-width:1000px;max-height:85vh;overflow-y:auto;padding:18px}
        .close-btn{position:sticky;top:8px;float:left;background:none;border:none;font-size:1.8em;cursor:pointer;color:#e74c3c}
        .room-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-top:10px;clear:both}
        .room{border:2px solid #ddd;border-radius:12px;padding:10px}
        .room.available{border-color:#2ecc71;background:#f0fff4}
        .room.full{border-color:#e74c3c;background:#fff5f5}
        .patient{background:#f8f9fa;border-radius:8px;padding:7px;margin:5px 0;border-right:3px solid #1e90ff;font-size:0.8em}
        .tag{display:inline-block;padding:2px 7px;border-radius:12px;font-size:0.7em;font-weight:bold}
        .tag.مقيم{background:#ffeaa7;color:#d68910}
        .tag.قيد-تخريج{background:#74b9ff;color:#054a91}
        .tag.مخرج{background:#dfe6e9;color:#636e72}
        .available-badge{background:#2ecc71;color:white;padding:3px 8px;border-radius:12px;font-size:0.7em;display:inline-block}
        .btn{padding:7px 12px;border:none;border-radius:18px;cursor:pointer;font-weight:bold;margin:2px;font-family:inherit;font-size:0.78em}
        .btn-primary{background:#2ecc71;color:white}
        .btn-warning{background:#f39c12;color:white}
        .btn-danger{background:#e74c3c;color:white}
        .btn-info{background:#3498db;color:white}
        .btn-big{padding:10px 18px;font-size:0.9em;background:#9b59b6;color:white;animation:pulse 2s infinite}
        @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(155,89,182,0.5)}70%{box-shadow:0 0 0 12px rgba(155,89,182,0)}100%{box-shadow:0 0 0 0 rgba(155,89,182,0)}}
        .btn-sm{padding:3px 7px;font-size:0.7em}
        .form-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:2000;justify-content:center;align-items:center}
        .form-overlay.active{display:flex}
        .form-box{background:white;border-radius:18px;padding:18px;width:90%;max-width:420px;text-align:right}
        .form-box h3{color:#0a3d62;text-align:center;margin-bottom:12px;font-size:1.1em}
        .form-group{margin-bottom:8px}
        .form-group label{display:block;margin-bottom:2px;font-weight:bold;font-size:0.85em}
        .form-group input,.form-group select{width:100%;padding:7px;border:2px solid #ddd;border-radius:8px;font-family:inherit;font-size:0.85em}
        .form-actions{display:flex;gap:6px;justify-content:center;margin-top:12px}
        .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2ecc71;color:white;padding:10px 20px;border-radius:25px;z-index:9999;font-weight:bold;font-size:0.9em;box-shadow:0 4px 15px rgba(0,0,0,0.3);animation:slideUp 0.4s ease}
        @keyframes slideUp{from{transform:translateX(-50%) translateY(80px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
    </style>
</head>
<body>
<div class="header">
    <h1>🏥 مشفى جامعة حلب AUH</h1>
    <p>لوحة متابعة الأجنحة والمرضى</p>
</div>
<div class="top-bar">
    <button class="btn btn-big" onclick="syncNow()">🔄 مزامنة الآن</button>
    <button class="btn btn-info" onclick="exportData()">📥 تصدير</button>
    <button class="btn btn-warning" onclick="importData()">📤 استيراد</button>
    <button class="btn btn-danger" onclick="resetAllData()">إعادة ضبط</button>
</div>

<div class="dashboard" id="dashboard"></div>

<div class="modal" id="wardModal">
    <div class="modal-content">
        <button class="close-btn" onclick="closeModal()">&times;</button>
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px">
            <h2 id="modalTitle" style="color:#0a3d62;font-size:1.2em"></h2>
            <button class="btn btn-primary" onclick="openPatientForm()">➕ إضافة مريض</button>
        </div>
        <div class="room-grid" id="roomGrid"></div>
    </div>
</div>

<div class="form-overlay" id="patientForm">
    <div class="form-box">
        <h3 id="formTitle">➕ إضافة مريض جديد</h3>
        <div class="form-group"><label>👤 اسم المريض</label><input type="text" id="pName" placeholder="الاسم الكامل"></div>
        <div class="form-group"><label>📋 التشخيص</label><input type="text" id="pDiagnosis" placeholder="تشخيص المرض"></div>
        <div class="form-group"><label>👨‍⚕️ الأخصائي</label><input type="text" id="pSpecialist" placeholder="د. الاسم"></div>
        <div class="form-group"><label>🏷️ الشعبة</label><select id="pUnit"><option>صدرية</option><option>كلية</option><option>هضمية</option><option>عصبية</option><option>داخلية</option><option>قلبية</option><option>جراحة وعائية</option><option>جراحة عصبية</option><option>جراحة عظمية</option><option>جراحة بولية</option><option>أورام</option><option>عينية</option><option>خارجية</option><option>خاص</option><option>عام</option></select></div>
        <div class="form-group"><label>📊 الحالة</label><select id="pStatus"><option>مقيم</option><option>قيد التخريج</option><option>مخرج</option></select></div>
        <div class="form-group"><label>🚪 الغرفة</label><select id="pRoom"></select></div>
        <div class="form-actions">
            <button class="btn btn-primary" onclick="savePatient()">💾 حفظ</button>
            <button class="btn btn-danger" onclick="closePatientForm()">❌ إلغاء</button>
        </div>
        <input type="hidden" id="editWardId"><input type="hidden" id="editRoomIdx"><input type="hidden" id="editPatIdx" value="-1">
    </div>
</div>

<script>
const defaultWards = [
    {id:1,name:"جناح الصدرية والكلية",rooms:[
        {number:"101",capacity:4,patients:[{name:"أحمد العلي",diagnosis:"ربو قصبي",specialist:"د. محمد نور",unit:"صدرية",status:"مقيم"},{name:"فاطمة الحسين",diagnosis:"فشل كلوي",specialist:"د. رنا قدور",unit:"كلية",status:"مقيم"}]},
        {number:"102",capacity:4,patients:[{name:"محمود الخطيب",diagnosis:"ذات رئة",specialist:"د. محمد نور",unit:"صدرية",status:"قيد التخريج"}]},
        {number:"103",capacity:4,patients:[]},{number:"104",capacity:4,patients:[{name:"سارة العمر",diagnosis:"تهاب كبيبات",specialist:"د. رنا قدور",unit:"كلية",status:"مقيم"},{name:"علي حسن",diagnosis:"انسداد رئوي",specialist:"د. محمد نور",unit:"صدرية",status:"مقيم"},{name:"نور الهدى",diagnosis:"تهاب قصبات",specialist:"د. أحمد شيخ",unit:"صدرية",status:"مخرج"}]},
        {number:"105",capacity:4,patients:[{name:"خالد الجاسم",diagnosis:"غسيل كلى",specialist:"د. رنا قدور",unit:"كلية",status:"مقيم"}]},{number:"106",capacity:4,patients:[]},{number:"107",capacity:4,patients:[{name:"ريم علي",diagnosis:"ربو حاد",specialist:"د. أحمد شيخ",unit:"صدرية",status:"قيد التخريج"}]},{number:"108",capacity:4,patients:[]}
    ]},
    {id:2,name:"جناح الهضمية والعصبية",rooms:[{number:"201",capacity:4,patients:[{name:"عمر القاضي",diagnosis:"تشمع كبد",specialist:"د. سامر زين",unit:"هضمية",status:"مقيم"}]},{number:"202",capacity:4,patients:[]},{number:"203",capacity:4,patients:[{name:"لينا خليل",diagnosis:"صرع",specialist:"د. هاني يونس",unit:"عصبية",status:"مقيم"},{name:"وسام درويش",diagnosis:"قرحة هضمية",specialist:"د. سامر زين",unit:"هضمية",status:"مقيم"}]}]},
    {id:3,name:"جناح العناية الداخلية",rooms:[{number:"301",capacity:4,patients:[{name:"حسن اليوسف",diagnosis:"سكري غير معاوض",specialist:"د. ليلى عثمان",unit:"داخلية",status:"مقيم"}]},{number:"302",capacity:4,patients:[]}]},
    {id:4,name:"الخاص الثالث",rooms:[{number:"401",capacity:2,patients:[{name:"كريم سعد",diagnosis:"متابعة قلبية",specialist:"د. نضال الحافظ",unit:"قلبية",status:"مقيم"}]},{number:"402",capacity:2,patients:[]}]},
    {id:5,name:"الخاص الرابع",rooms:[{number:"501",capacity:2,patients:[]},{number:"502",capacity:2,patients:[{name:"سوسن عبدالله",diagnosis:"جراحة عامة",specialist:"د. فادي حمدان",unit:"جراحة",status:"قيد التخريج"}]}]},
    {id:6,name:"الخارجيات",rooms:[{number:"خ-1",capacity:6,patients:[{name:"رامي الأسود",diagnosis:"تطبيب خارجي",specialist:"د. نورا عبدالقادر",unit:"خارجية",status:"مقيم"},{name:"هبة عكاش",diagnosis:"تطبيب خارجي",specialist:"د. نورا عبدالقادر",unit:"خارجية",status:"مقيم"}]}]},
    {id:7,name:"العناية القلبية والجراحات",rooms:[{number:"601 وعائية",capacity:3,patients:[{name:"عدنان الريس",diagnosis:"بعد قثطرة",specialist:"د. نضال الحافظ",unit:"قلبية",status:"مقيم"}]},{number:"602 عصبية",capacity:3,patients:[]},{number:"603 عظمية",capacity:3,patients:[{name:"جهاد المصري",diagnosis:"كسر فخذ",specialist:"د. عامر حلبي",unit:"جراحة عظمية",status:"مقيم"}]},{number:"604 بولية",capacity:3,patients:[]},{number:"605 أورام",capacity:3,patients:[]},{number:"606 عينية",capacity:3,patients:[]}]}
];

let wardsData = [];
loadData();

function loadData() {
    let saved = localStorage.getItem('auh_wards');
    if(saved) { wardsData = JSON.parse(saved); }
    else { wardsData = JSON.parse(JSON.stringify(defaultWards)); saveData(); }
    renderDashboard();
}

function saveData() { localStorage.setItem('auh_wards', JSON.stringify(wardsData)); }

function resetAllData() {
    if(confirm('⚠️ متأكد من إعادة ضبط جميع البيانات؟')) {
        wardsData = JSON.parse(JSON.stringify(defaultWards));
        saveData(); renderDashboard();
        showToast('✅ تمت إعادة الضبط');
    }
}

function syncNow() {
    let dataStr = JSON.stringify(wardsData);
    let encoded = btoa(unescape(encodeURIComponent(dataStr)));
    let shareUrl = window.location.href.split('?')[0] + '?sync=' + encoded;
    navigator.clipboard.writeText(shareUrl).then(() => {
        showToast('✅ تم نسخ رابط المزامنة! أرسله للزملاء عبر واتساب');
    }).catch(() => {
        prompt('انسخ هذا الرابط وأرسله للزملاء:', shareUrl);
    });
    window.history.replaceState({}, document.title, window.location.pathname + '?sync=' + encoded);
}

function checkSync() {
    let params = new URLSearchParams(window.location.search);
    let syncData = params.get('sync');
    if (syncData) {
        try {
            let decoded = decodeURIComponent(escape(atob(syncData)));
            let data = JSON.parse(decoded);
            let newStr = JSON.stringify(data);
            let oldStr = JSON.stringify(wardsData);
            if (newStr !== oldStr) {
                if (confirm('📲 توجد بيانات محدثة من زميل. هل تريد تحديث البيانات الآن؟')) {
                    wardsData = data;
                    saveData();
                    renderDashboard();
                    showToast('✅ تم تحديث البيانات بنجاح!');
                }
            }
            window.history.replaceState({}, document.title, window.location.pathname);
        } catch(err) {}
    }
}

function exportData() {
    let blob = new Blob([JSON.stringify(wardsData)], {type:'application/json'});
    let a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'AUH_data.json';
    a.click();
    showToast('✅ تم التصدير');
}

function importData() {
    let inp = document.createElement('input');
    inp.type = 'file'; inp.accept = '.json';
    inp.onchange = function(e) {
        let reader = new FileReader();
        reader.onload = function(ev) {
            try {
                let data = JSON.parse(ev.target.result);
                if(confirm('⚠️ استيراد البيانات سيستبدل كل البيانات. متأكد؟')) {
                    wardsData = data; saveData(); renderDashboard();
                    showToast('✅ تم الاستيراد');
                }
            } catch(err) { alert('❌ الملف غير صالح'); }
        };
        reader.readAsText(e.target.files[0]);
    };
    inp.click();
}

function showToast(msg) {
    let t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2500);
}

function renderDashboard() {
    document.getElementById('dashboard').innerHTML = wardsData.map(w => {
        let total = w.rooms.reduce((s,r) => s + r.capacity, 0);
        let occupied = w.rooms.reduce((s,r) => s + r.patients.length, 0);
        let avail = total - occupied;
        return `<div class="ward-card" onclick="openWard(${w.id})">
            <h2>🏥 ${w.name}</h2>
            <p>🛏️ ${w.rooms.length} غرف | 👤 ${occupied}/${total} | متاح: ${avail}</p>
            ${avail>0 ? `<span class="available-badge">✨ ${avail} متاح</span>` : '<span class="full-badge">⚠️ ممتلئ</span>'}
        </div>`;
    }).join('');
}

let currentWardId = null;
function openWard(id) {
    currentWardId = id;
    let w = wardsData.find(w => w.id === id);
    if(!w) return;
    document.getElementById('modalTitle').textContent = w.name;
    document.getElementById('roomGrid').innerHTML = w.rooms.map((r,ri) => {
        let avail = r.capacity - r.patients.length;
        return `<div class="room ${avail>0?'available':'full'}">
            <h4>🚪 ${r.number} ${avail>0?`<span class="available-badge">${avail} متاح</span>`:'<span class="full-badge">ممتلئة</span>'}</h4>
            ${r.patients.length===0?'<p style="color:#888;text-align:center;padding:6px;">🛏️ فارغة</p>':''}
            ${r.patients.map((p,pi)=>`<div class="patient"><strong>👤 ${p.name}</strong><br>📋 ${p.diagnosis}<br>👨‍⚕️ ${p.specialist}<br>🏷️ ${p.unit}<br><span class="tag ${p.status.replace(/\s/g,'-')}">${p.status}</span><div style="margin-top:3px;"><button class="btn btn-warning btn-sm" onclick="event.stopPropagation();editPatient(${id},${ri},${pi})">✏️</button><button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deletePatient(${id},${ri},${pi})">🗑️</button></div></div>`).join('')}
            <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();openPatientFormForRoom(${id},${ri})" style="margin-top:5px;width:100%">➕ حجز</button>
        </div>`;
    }).join('');
    document.getElementById('wardModal').classList.add('active');
}

function closeModal() { document.getElementById('wardModal').classList.remove('active'); renderDashboard(); }
function openPatientForm() { document.getElementById('formTitle').textContent='➕ إضافة مريض جديد'; document.getElementById('editPatIdx').value='-1'; document.getElementById('editWardId').value=currentWardId; clearForm(); fillRoomSelect(); document.getElementById('patientForm').classList.add('active'); }
function openPatientFormForRoom(wid, rid) { currentWardId=wid; document.getElementById('formTitle').textContent='➕ حجز في غرفة '+wardsData.find(w=>w.id===wid).rooms[rid].number; document.getElementById('editPatIdx').value='-1'; document.getElementById('editWardId').value=wid; document.getElementById('editRoomIdx').value=rid; clearForm(); fillRoomSelect(rid); document.getElementById('patientForm').classList.add('active'); }
function editPatient(wid, rid, pid) { currentWardId=wid; let p=wardsData.find(w=>w.id===wid).rooms[rid].patients[pid]; document.getElementById('formTitle').textContent='✏️ تعديل بيانات المريض'; document.getElementById('editPatIdx').value=pid; document.getElementById('editWardId').value=wid; document.getElementById('editRoomIdx').value=rid; document.getElementById('pName').value=p.name; document.getElementById('pDiagnosis').value=p.diagnosis; document.getElementById('pSpecialist').value=p.specialist; document.getElementById('pUnit').value=p.unit; document.getElementById('pStatus').value=p.status; fillRoomSelect(rid); document.getElementById('patientForm').classList.add('active'); }
function clearForm() { document.getElementById('pName').value=''; document.getElementById('pDiagnosis').value=''; document.getElementById('pSpecialist').value=''; document.getElementById('pUnit').value='صدرية'; document.getElementById('pStatus').value='مقيم'; }
function fillRoomSelect(sid=null) { let w=wardsData.find(w=>w.id===currentWardId); let sel=document.getElementById('pRoom'); sel.innerHTML=w.rooms.map((r,i)=>{ let avail=r.capacity-r.patients.length; let s=(sid!==null&&i===sid)?'selected':''; let d=(avail<=0&&i!==sid)?'disabled':''; return `<option value="${i}" ${s} ${d}>غرفة ${r.number} (${avail>0?avail+' متاح':'ممتلئة'})</option>`; }).join(''); }
function savePatient() { let wid=parseInt(document.getElementById('editWardId').value); let rid=parseInt(document.getElementById('pRoom').value); let pid=parseInt(document.getElementById('editPatIdx').value); let w=wardsData.find(w=>w.id===wid); let name=document.getElementById('pName').value.trim(); let diagnosis=document.getElementById('pDiagnosis').value.trim(); let specialist=document.getElementById('pSpecialist').value.trim(); if(!name||!diagnosis||!specialist){alert('⚠️ الرجاء ملء جميع الحقول');return;} let patient={name,diagnosis,specialist,unit:document.getElementById('pUnit').value,status:document.getElementById('pStatus').value}; if(pid===-1){if(w.rooms[rid].patients.length>=w.rooms[rid].capacity){alert('⚠️ الغرفة ممتلئة!');return;}w.rooms[rid].patients.push(patient);}else{let oldRid=parseInt(document.getElementById('editRoomIdx').value);if(oldRid!==rid){if(w.rooms[rid].patients.length>=w.rooms[rid].capacity){alert('⚠️ الغرفة الجديدة ممتلئة!');return;}w.rooms[oldRid].patients.splice(pid,1);w.rooms[rid].patients.push(patient);}else{w.rooms[rid].patients[pid]=patient;}} saveData(); closePatientForm(); openWard(wid); showToast('✅ تم الحفظ - اضغط 🔄 مزامنة الآن للمشاركة'); }
function deletePatient(wid, rid, pid) { if(!confirm('⚠️ متأكد من حذف المريض؟'))return; wardsData.find(w=>w.id===wid).rooms[rid].patients.splice(pid,1); saveData(); openWard(wid); }
function closePatientForm() { document.getElementById('patientForm').classList.remove('active'); }
document.getElementById('wardModal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('patientForm').addEventListener('click',function(e){if(e.target===this)closePatientForm();});

checkSync();
</script>
</body>
</html>
